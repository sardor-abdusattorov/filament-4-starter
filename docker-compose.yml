services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html
      - ./docker/php/php.dev.ini:/usr/local/etc/php/conf.d/app.ini  # dev overrides prod config
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - app

  db:
    image: mariadb:11
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-secret}"
      MARIADB_DATABASE: "${DB_DATABASE}"
      MARIADB_USER: "${DB_USERNAME}"
      MARIADB_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      retries: 5
      timeout: 5s

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    environment:
      PMA_HOST: db
      PMA_USER: "${DB_USERNAME}"
      PMA_PASSWORD: "${DB_PASSWORD}"
    networks:
      - app-network
    depends_on:
      - db

  # -------------------------------------------------------
  # PostgreSQL + pgAdmin (альтернатива MariaDB + phpMyAdmin)
  # Чтобы использовать:
  #   1. Раскомментируй pgsql и pgadmin ниже
  #   2. Закомментируй db и phpmyadmin выше
  #   3. Поменяй в .env: DB_CONNECTION=pgsql, DB_HOST=pgsql, DB_PORT=5432
  # -------------------------------------------------------
  # pgsql:
  #   image: postgres:17-alpine
  #   ports:
  #     - "${FORWARD_DB_PORT:-5432}:5432"
  #   environment:
  #     POSTGRES_DB: "${DB_DATABASE}"
  #     POSTGRES_USER: "${DB_USERNAME}"
  #     POSTGRES_PASSWORD: "${DB_PASSWORD}"
  #   volumes:
  #     - pgsql-data:/var/lib/postgresql/data
  #   networks:
  #     - app-network
  #   healthcheck:
  #     test: ["CMD", "pg_isready", "-q", "-d", "${DB_DATABASE}", "-U", "${DB_USERNAME}"]
  #     retries: 5
  #     interval: 10s
  #     timeout: 5s

  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   ports:
  #     - "${PGADMIN_PORT:-5050}:80"
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: "${PGADMIN_EMAIL:-admin@admin.com}"
  #     PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_PASSWORD:-secret}"
  #   networks:
  #     - app-network
  #   depends_on:
  #     - pgsql

  redis:
    image: redis:alpine
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${FORWARD_MAILPIT_PORT:-1025}:1025"
      - "${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025"
    networks:
      - app-network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
  redis-data:
  # pgsql-data:

networks:
  app-network:
    driver: bridge
